services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mycomputer-postgres
    environment:
      POSTGRES_USER: mycomputer
      POSTGRES_PASSWORD: mycomputer
      POSTGRES_DB: mycomputer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycomputer -d mycomputer"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:0.5.23
    container_name: mycomputer-chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
      IS_PERSISTENT: "true"
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mycomputer-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mycomputer:mycomputer@postgres:5432/mycomputer
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-long-random-string}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
  chroma_data: